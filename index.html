const SKIP_CATS=new Set(['Other','Transfers']);

async function extractRows(pdf){
  const allRows=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);const content=await page.getTextContent();
    if(!content.items.length)continue;
    const buckets={};
    for(const item of content.items){
      const text=item.str;if(!text||!text.trim())continue;
      const y=Math.round(item.transform[5]);const x=Math.round(item.transform[4]);
      let bk=null;
      for(const k of Object.keys(buckets)){if(Math.abs(parseInt(k)-y)<=4){bk=k;break;}}
      if(!bk)bk=y.toString();if(!buckets[bk])buckets[bk]=[];
      buckets[bk].push({text,x});
    }
    const sortedYs=Object.keys(buckets).map(Number).sort((a,b)=>b-a);
    for(const k of sortedYs){
      const items=buckets[k].sort((a,b)=>a.x-b.x);
      allRows.push(items.map(i=>i.text.trim()).filter(Boolean).join('  '));
    }
  }
  return allRows;
}

// Check if PDF has any extractable text at all
async function hasText(pdf){
  let totalChars=0;
  for(let p=1;p<=Math.min(pdf.numPages,3);p++){
    const page=await pdf.getPage(p);
    const content=await page.getTextContent();
    for(const item of content.items)totalChars+=item.str.trim().length;
  }
  return totalChars>50;
}

function parseAllTransactions(rows){
  const txns=[];
  const dateRe=[/\b\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\b/,/\b\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+\d{2,4}\b/i,/\b\d{1,2}(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\d{2,4}\b/i];
  const creditRe=/\b(CR\b|CREDIT|CREDITED|SALARY|RECEIVED|REFUND|CASHBACK|REVERSAL|BY TRANSFER|INTEREST CREDIT|INT\.PAID|DIVIDEND)/i;
  const skipRe=/\b(OPENING BALANCE|CLOSING BALANCE|STATEMENT SUMMARY|PAGE \d|GRAND TOTAL|ACCOUNT NUMBER|CUSTOMER ID|BRANCH|IFSC|CIF NO|NOMINEE|EMAIL ID|PARTICULARS|NARRATION|DESCRIPTION|WITHDRAWAL|DEPOSIT\b|BALANCE\b|CHEQUE NO|DATE\s+DATE)\b/i;

  for(let i=0;i<rows.length;i++){
    const row=rows[i];if(!row||row.length<10)continue;
    const words=row.split(/\s+/);const skipW=words.filter(w=>skipRe.test(w));
    if(skipW.length>words.length*0.4&&words.length<8)continue;
    let hasDate=false;for(const re of dateRe){if(re.test(row)){hasDate=true;break;}}
    if(!hasDate)continue;

    const amounts=[];let m;
    const re=/(\d{1,3}(?:,\d{2,3})*\.\d{2})\b/g;
    while((m=re.exec(row))!==null){const val=parseFloat(m[1].replace(/,/g,''));if(val>0&&val<50000000)amounts.push({val,idx:m.index});}
    if(amounts.length===0){
      const re2=/\b(\d{1,3}(?:,\d{2,3})+)\b/g;
      while((m=re2.exec(row))!==null){const val=parseFloat(m[1].replace(/,/g,''));if(val>=10&&val<50000000)amounts.push({val,idx:m.index});}
    }
    if(amounts.length===0)continue;

    let fullRow=row;let la=1;
    while(la<=2&&(i+la)<rows.length){
      const nr=rows[i+la];if(!nr)break;
      let nd=false;for(const r2 of dateRe){if(r2.test(nr)){nd=true;break;}}
      const na=nr.match(/\d{1,3}(?:,\d{2,3})*\.\d{2}/g);
      if(!nd&&!na&&nr.length<80&&nr.length>2){fullRow+=' '+nr;la++;}else break;
    }

    const narration=fullRow.toUpperCase();
    const isCredit=creditRe.test(narration);
    let amount=0;
    if(amounts.length===1){amount=amounts[0].val;}
    else{
      const sorted=[...amounts].sort((a,b)=>a.idx-b.idx);
      const lastVal=sorted[sorted.length-1].val;
      for(const a of sorted){if(a.val!==lastVal||sorted.length<=2){amount=a.val;break;}}
      if(amount===0)amount=sorted[0].val;
      if(amounts.length===2&&amount>amounts[1].val*3)amount=Math.min(amounts[0].val,amounts[1].val);
    }
    if(amount<1||amount>5000000)continue;

    let category='Other';let matchedKw='';
    for(const[cat,info]of Object.entries(CATEGORIES)){
      for(const kw of info.kw){if(narration.includes(kw)){category=cat;matchedKw=kw;break;}}
      if(category!=='Other')break;
    }

    let merchant=narration.substring(0,60);
    merchant=merchant.replace(/\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}/g,'');
    merchant=merchant.replace(/\d{1,2}\s*(?:JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\w*\s*\d{2,4}/gi,'');
    merchant=merchant.replace(/^(UPI[\/\-\s]*|POS\s*[\/\s]*|ECOM[\/\s]*|IB[\/\s]*|MB[\/\s]*|NFS[\/\s]*|VPS[\/\s]*|BIL[\/\s]*|BILL\s*)/i,'');
    merchant=merchant.replace(/\d{1,3}(?:,\d{2,3})*\.\d{2}/g,'');
    merchant=merchant.replace(/\b\d{8,}\b/g,'');
    merchant=merchant.split(/[\/\-@\\]/)[0].trim();
    merchant=merchant.replace(/^\W+|\W+$/g,'').substring(0,28);
    if(!merchant||merchant.length<2)merchant=matchedKw||'UNKNOWN';
    txns.push({narration,amount,category,merchant,isCredit});
  }
  return txns;
}

function analyze(txns){
  const debits=txns.filter(t=>!t.isCredit&&!SKIP_CATS.has(t.category));
  const byCat={};
  for(const t of debits){if(!byCat[t.category])byCat[t.category]={total:0,count:0};byCat[t.category].total+=t.amount;byCat[t.category].count++;}
  const sorted=Object.entries(byCat).map(([name,data])=>({name,...data})).sort((a,b)=>b.total-a.total);
  const grandTotal=sorted.reduce((s,c)=>s+c.total,0);
  return{categories:sorted,grandTotal,txnCount:debits.length};
}

let amountsVisible=true;let currentResult=null;

function updateAmounts(){
  if(!currentResult)return;
  const r=currentResult;const total=r.grandTotal;
  document.getElementById('shareTotal').textContent=amountsVisible?`₹${formatNum(total)}`:'₹••••••';
  let prevData=null;
  try{const s=localStorage.getItem('kharcha_last');if(s)prevData=JSON.parse(s);}catch(e){}
  const grid=document.getElementById('shareGrid');grid.innerHTML='';
  const cats=r.categories.slice(0,8);
  cats.forEach((cat,idx)=>{
    const pct=((cat.total/total)*100).toFixed(0);
    const ci=CATEGORIES[cat.name]||{css:'other',icon:'📌'};
    const isHero=idx===0;
    const div=document.createElement('div');
    div.className=`share-cat${isHero?' hero':''}`;
    let deltaHtml='';
    if(prevData&&prevData.cats&&prevData.cats[cat.name]){
      const prev=prevData.cats[cat.name];
      const change=((cat.total-prev)/prev*100).toFixed(0);
      if(change>0)deltaHtml=`<span class="share-cat-delta up">↑${change}%</span>`;
      else if(change<0)deltaHtml=`<span class="share-cat-delta down">↓${Math.abs(change)}%</span>`;
    }
    const amtText=amountsVisible?`₹${formatNum(cat.total)}`:'₹••••';
    div.innerHTML=`<div class="share-cat-icon si-${ci.css}">${ci.icon}</div><div class="share-cat-info"><div class="share-cat-name">${cat.name}</div><div class="share-cat-amt">${amtText}<span class="share-cat-pct">${pct}%</span>${deltaHtml}</div></div>`;
    grid.appendChild(div);
  });
}

function formatNum(n){
  const s=Math.round(n).toString();if(s.length<=3)return s;
  let r=s.slice(-3);let rest=s.slice(0,-3);
  while(rest.length>2){r=rest.slice(-2)+','+r;rest=rest.slice(0,-2);}
  if(rest.length>0)r=rest+','+r;return r;
}

async function handleFile(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){showStatus('please select a PDF file',true);return;}
  currentFile=new Uint8Array(await file.arrayBuffer());
  showStatus('reading...');
  try{const pdf=await pdfjsLib.getDocument({data:currentFile.slice()}).promise;await processPDF(pdf);}
  catch(err){
    if(err.name==='PasswordException'){pwdSection.style.display='block';showStatus('password protected');pwdInput.focus();}
    else showStatus('could not read this PDF: '+err.message,true);
  }
}

unlockBtn.addEventListener('click',async()=>{
  const pwd=pwdInput.value.trim();if(!pwd)return;showStatus('unlocking...');
  try{const pdf=await pdfjsLib.getDocument({data:currentFile.slice(),password:pwd}).promise;pwdSection.style.display='none';await processPDF(pdf);}
  catch(err){
    if(err.name==='PasswordException')showStatus('wrong password - try DOB (DDMMYYYY) or PAN',true);
    else showStatus('could not read: '+err.message,true);
  }
});
pwdInput.addEventListener('keydown',e=>{if(e.key==='Enter')unlockBtn.click();});

async function processPDF(pdf){
  showStatus('analyzing spending...');

  // Check if PDF has extractable text
  const textFound=await hasText(pdf);
  if(!textFound){
    showStatus('this PDF has no readable text - it may be a scanned image or the text was removed. try the original password-protected version from your bank.',true);
    return;
  }

  // Strategy 1: position-aware rows
  const rows=await extractRows(pdf);
  let txns=parseAllTransactions(rows);

  // Strategy 2: Y-gap newlines
  if(txns.length<3){
    let ft='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);const content=await page.getTextContent();
      let lastY=null;
      for(const item of content.items){const y=Math.round(item.transform[5]);if(lastY!==null&&Math.abs(y-lastY)>4)ft+='\n';else if(lastY!==null)ft+='  ';ft+=item.str;lastY=y;}
      ft+='\n';
    }
    const t2=parseAllTransactions(ft.split('\n').filter(r=>r.trim()));
    if(t2.length>txns.length)txns=t2;
  }

  // Strategy 3: date-split
  if(txns.length<3){
    let ft='';
    for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const content=await page.getTextContent();ft+=content.items.map(item=>item.str).join(' ')+'\n';}
    const t3=parseAllTransactions(ft.split(/(?=\b\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\b)|(?=\b\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec))/i).filter(r=>r.trim()));
    if(t3.length>txns.length)txns=t3;
  }

  if(txns.length===0){
    showStatus('could not detect transactions in this PDF. supported: HDFC, ICICI, SBI, Kotak, Axis and most Indian bank statements with text-based transaction tables.',true);
    return;
  }
  const result=analyze(txns);
  if(result.grandTotal===0){
    showStatus('transactions found but none matched known spending categories. the statement may not have recognizable merchant names.',true);
    return;
  }
  statusEl.style.display='none';
  render(result);
}

document.getElementById('eyeToggle').addEventListener('click',()=>{
  amountsVisible=!amountsVisible;
  document.getElementById('eyeToggle').textContent=amountsVisible?'👁':'🔒';
  updateAmounts();
});

document.getElementById('rememberBtn').addEventListener('click',()=>{
  if(!currentResult)return;
  const data={date:new Date().toISOString(),total:currentResult.grandTotal,cats:{}};
  for(const c of currentResult.categories)data.cats[c.name]=c.total;
  try{localStorage.setItem('kharcha_last',JSON.stringify(data));}catch(e){}
  const btn=document.getElementById('rememberBtn');
  btn.textContent='✓ saved for next month';btn.disabled=true;
  setTimeout(()=>{btn.textContent='📌 remember this month';btn.disabled=false;},2000);
});

document.getElementById('clearBtn').addEventListener('click',()=>{
  currentFile=null;currentResult=null;amountsVisible=true;
  fileInput.value='';pwdInput.value='';
  pwdSection.style.display='none';resultsEl.style.display='none';statusEl.style.display='none';
  document.getElementById('shareGrid').innerHTML='';
  document.getElementById('shareTotal').textContent='₹0';
  document.getElementById('eyeToggle').textContent='👁';
  dropzone.scrollIntoView({behavior:'smooth'});
});

function showStatus(msg,isError=false){
  statusEl.textContent=msg;statusEl.className='status'+(isError?' error':'');
  statusEl.style.display='block';resultsEl.style.display='none';
}
