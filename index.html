const SKIP_CATS = new Set(['Other','Transfers']);

// Keyword index sorted by length descending (longer matches first)
const KW_INDEX = [];
for (const [cat, info] of Object.entries(CATEGORIES)) {
  for (const kw of info.kw) KW_INDEX.push({kw: kw.toUpperCase(), cat, display: kw.trim().toLowerCase().replace(/\b\w/g, c => c.toUpperCase())});
}
KW_INDEX.sort((a, b) => b.kw.length - a.kw.length);

function categorize(text) {
  const upper = text.toUpperCase();
  for (const e of KW_INDEX) {
    if (upper.includes(e.kw)) return {cat: e.cat, merchant: e.display};
  }
  return {cat: 'Other', merchant: 'Other'};
}

// ══════════════════════════════════════════════════
// PDF EXTRACTION - COLUMN AWARE
// ══════════════════════════════════════════════════

// Extract all text items with positions from PDF
async function getAllItems(pdf) {
  const pages = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const items = [];
    for (const item of content.items) {
      if (!item.str || !item.str.trim()) continue;
      items.push({
        text: item.str.trim(),
        x: Math.round(item.transform[4]),
        y: Math.round(item.transform[5])
      });
    }
    pages.push(items);
  }
  return pages;
}

// Check if PDF has extractable text
async function hasText(pdf) {
  let c = 0;
  for (let p = 1; p <= Math.min(pdf.numPages, 3); p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    for (const item of content.items) c += item.str.trim().length;
  }
  return c > 50;
}

// Group items into rows by Y position (tolerance 4 units)
function groupByY(items) {
  const buckets = {};
  for (const item of items) {
    let key = null;
    for (const k of Object.keys(buckets)) {
      if (Math.abs(parseInt(k) - item.y) <= 4) { key = k; break; }
    }
    if (!key) key = item.y.toString();
    if (!buckets[key]) buckets[key] = [];
    buckets[key].push(item);
  }
  return Object.keys(buckets)
    .map(Number)
    .sort((a, b) => b - a) // top to bottom (PDF Y is bottom-up)
    .map(k => buckets[k].sort((a, b) => a.x - b.x));
}

// Detect column header positions
// Looks for a row containing WITHDRAWAL/DEBIT AND BALANCE
function detectColumns(pages) {
  const debitWords = ['WITHDRAWAL','WITHDRAWALS','DEBIT','DEBIT AMT'];
  const depositWords = ['DEPOSIT','DEPOSITS','CREDIT','CREDIT AMT'];
  const balanceWords = ['BALANCE','CLOSING BAL'];

  for (const pageItems of pages) {
    const rows = groupByY(pageItems);
    for (const row of rows) {
      let debitX = null, depositX = null, balanceX = null;

      for (const item of row) {
        const t = item.text.toUpperCase();
        if (debitX === null) {
          for (const w of debitWords) { if (t.includes(w)) { debitX = item.x; break; } }
        }
        if (depositX === null) {
          for (const w of depositWords) { if (t.includes(w)) { depositX = item.x; break; } }
        }
        if (balanceX === null) {
          for (const w of balanceWords) { if (t.includes(w)) { balanceX = item.x; break; } }
        }
      }

      // Need at least withdrawal/debit column detected
      if (debitX !== null) {
        return {debitX, depositX, balanceX};
      }
    }
  }
  return null;
}

// Check if a text item looks like a number (amount)
function parseAmount(text) {
  const cleaned = text.replace(/[,\s]/g, '');
  // Match: 223.00, 8977.00, 1234, 12345.67
  if (/^\d+(\.\d{1,2})?$/.test(cleaned)) {
    const val = parseFloat(cleaned);
    if (val > 0 && val < 50000000) return val;
  }
  return null;
}

// Date patterns
const DATE_RES = [
  /\b(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})\b/,
  /\b(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+\d{2,4})\b/i,
  /\b(\d{1,2}(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\d{2,4})\b/i
];

// Rows to skip
const SKIP_ROW_RE = /OPENING\s*BAL|CLOSING\s*BAL|STATEMENT\s*(OF|SUMMARY|PERIOD)|B\/?F|BROUGHT?\s*FORWARD|CARRIED?\s*FORWARD|C\/?F/i;

// ══════════════════════════════════════════════════
// STRATEGY 1: Column-aware extraction
// ══════════════════════════════════════════════════
function extractWithColumns(pages, columns) {
  const txns = [];
  const COL_TOLERANCE = 80; // pixels tolerance for column matching

  for (const pageItems of pages) {
    const rows = groupByY(pageItems);

    for (const row of rows) {
      const rowText = row.map(i => i.text).join('  ');
      const rowUpper = rowText.toUpperCase();

      // Skip header/balance/summary rows
      if (SKIP_ROW_RE.test(rowUpper)) continue;
      if (/PARTICULARS|NARRATION|DESCRIPTION|CHEQUE NO|HEADER|FOOTER/i.test(rowUpper) &&
          row.length < 6 && rowText.length < 60) continue;

      // Must have a date
      let dateStr = '';
      for (const re of DATE_RES) {
        const m = rowText.match(re);
        if (m) { dateStr = m[1] || m[0]; break; }
      }
      if (!dateStr) continue;

      // Find amount-items and their X positions
      let withdrawalAmt = 0;
      let isDeposit = false;

      for (const item of row) {
        const val = parseAmount(item.text);
        if (val === null) continue;

        // Compute distance to each known column
        const distDebit = columns.debitX !== null ? Math.abs(item.x - columns.debitX) : Infinity;
        const distDeposit = columns.depositX !== null ? Math.abs(item.x - columns.depositX) : Infinity;
        const distBalance = columns.balanceX !== null ? Math.abs(item.x - columns.balanceX) : Infinity;

        const minDist = Math.min(distDebit, distDeposit, distBalance);

        if (minDist === distDebit && distDebit <= COL_TOLERANCE) {
          withdrawalAmt = val;
        } else if (minDist === distDeposit && distDeposit <= COL_TOLERANCE) {
          isDeposit = true;
        }
        // If nearest to balance column, ignore it
      }

      // Skip deposit rows and rows with no withdrawal
      if (withdrawalAmt === 0 || isDeposit) continue;
      if (withdrawalAmt < 1) continue;

      // Categorize using keyword index
      const {cat, merchant} = categorize(rowUpper);

      txns.push({amount: withdrawalAmt, category: cat, merchant, isCredit: false, date: dateStr, narration: rowUpper});
    }
  }
  return txns;
}

// ══════════════════════════════════════════════════
// STRATEGY 2: Row-based fallback (no column info)
// Uses rightmost amount as balance, second-to-last as transaction
// ══════════════════════════════════════════════════
function extractRowBased(pages) {
  const txns = [];
  const creditRe = /\b(CR\b|CREDIT|CREDITED|SALARY|RECEIVED|REFUND|CASHBACK|REVERSAL|BY TRANSFER|INTEREST CREDIT|INT\.PAID|DIVIDEND)/i;

  for (const pageItems of pages) {
    const rows = groupByY(pageItems);

    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const rowText = row.map(it => it.text).join('  ');
      const rowUpper = rowText.toUpperCase();

      if (SKIP_ROW_RE.test(rowUpper)) continue;

      let dateStr = '';
      for (const re of DATE_RES) {
        const m = rowText.match(re);
        if (m) { dateStr = m[1] || m[0]; break; }
      }
      if (!dateStr) continue;

      // Extract all amounts from row text (regex-based)
      const amounts = [];
      let mt;
      const amtRe = /(\d{1,3}(?:,\d{2,3})*\.\d{2})\b/g;
      while ((mt = amtRe.exec(rowText)) !== null) {
        const val = parseFloat(mt[1].replace(/,/g, ''));
        if (val > 0 && val < 50000000) amounts.push(val);
      }
      // Fallback: comma-separated integers
      if (amounts.length === 0) {
        const intRe = /\b(\d{1,3}(?:,\d{2,3})+)\b/g;
        while ((mt = intRe.exec(rowText)) !== null) {
          const val = parseFloat(mt[1].replace(/,/g, ''));
          if (val >= 10 && val < 50000000) amounts.push(val);
        }
      }
      if (amounts.length < 2) continue; // Need at least amount + balance

      const isCredit = creditRe.test(rowUpper);
      if (isCredit) continue;

      // Rightmost amount is balance, take the one before it
      const balance = amounts[amounts.length - 1];
      const txnAmt = amounts[amounts.length - 2];

      if (txnAmt < 1 || txnAmt > 5000000) continue;
      // Sanity check: txn amount should not equal balance
      if (txnAmt === balance && amounts.length === 2) continue;

      const {cat, merchant} = categorize(rowUpper);
      txns.push({amount: txnAmt, category: cat, merchant, isCredit: false, date: dateStr, narration: rowUpper});
    }
  }
  return txns;
}

// ══════════════════════════════════════════════════
// STRATEGY 3: Date-split fallback (last resort)
// ══════════════════════════════════════════════════
function extractDateSplit(pages) {
  let fullText = '';
  for (const pageItems of pages) {
    fullText += pageItems.map(i => i.text).join(' ') + '\n';
  }
  const chunks = fullText.split(/(?=\b\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\b)|(?=\b\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec))/i).filter(r => r.trim());

  const txns = [];
  const creditRe = /\b(CR\b|CREDIT|CREDITED|SALARY|RECEIVED|REFUND|CASHBACK|REVERSAL)/i;

  for (const chunk of chunks) {
    if (SKIP_ROW_RE.test(chunk)) continue;
    let dateStr = '';
    for (const re of DATE_RES) {
      const m = chunk.match(re);
      if (m) { dateStr = m[1] || m[0]; break; }
    }
    if (!dateStr) continue;

    const amounts = [];
    let mt;
    const amtRe = /(\d{1,3}(?:,\d{2,3})*\.\d{2})\b/g;
    while ((mt = amtRe.exec(chunk)) !== null) {
      const val = parseFloat(mt[1].replace(/,/g, ''));
      if (val > 0 && val < 50000000) amounts.push(val);
    }
    if (amounts.length < 2) continue;
    if (creditRe.test(chunk.toUpperCase())) continue;

    const balance = amounts[amounts.length - 1];
    const txnAmt = amounts[amounts.length - 2];
    if (txnAmt < 1 || txnAmt > 5000000) continue;
    if (txnAmt === balance && amounts.length === 2) continue;

    const {cat, merchant} = categorize(chunk.toUpperCase());
    txns.push({amount: txnAmt, category: cat, merchant, isCredit: false, date: dateStr, narration: chunk.toUpperCase()});
  }
  return txns;
}

// ══════════════════════════════════════════════════
// ANALYSIS
// ══════════════════════════════════════════════════
function analyze(txns) {
  const debits = txns.filter(t => !t.isCredit && !SKIP_CATS.has(t.category));
  const byCat = {};
  for (const t of debits) {
    if (!byCat[t.category]) byCat[t.category] = {total: 0, count: 0, items: []};
    byCat[t.category].total += t.amount;
    byCat[t.category].count++;
    byCat[t.category].items.push({merchant: t.merchant, amount: t.amount, date: t.date});
  }
  const sorted = Object.entries(byCat).map(([name, data]) => ({name, ...data})).sort((a, b) => b.total - a.total);
  const grandTotal = sorted.reduce((s, c) => s + c.total, 0);
  const allDates = txns.map(t => t.date).filter(Boolean);
  return {categories: sorted, grandTotal, txnCount: debits.length, monthStr: getMonthRange(allDates)};
}

function getMonthRange(dateStrings) {
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const parsed = [];
  for (const ds of dateStrings) {
    let m = ds.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
    if (m) {
      let yr = parseInt(m[3]); if (yr < 100) yr += 2000;
      parsed.push({month: parseInt(m[2]) - 1, year: yr});
      continue;
    }
    m = ds.match(/(\d{1,2})\s*(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s*(\d{2,4})/i);
    if (m) {
      let yr = parseInt(m[3]); if (yr < 100) yr += 2000;
      const mi = months.indexOf(m[2].toLowerCase().substring(0, 3));
      if (mi >= 0) parsed.push({month: mi, year: yr});
    }
  }
  if (!parsed.length) return new Date().toLocaleString('en-IN',{month:'short',year:'numeric'}).toLowerCase();
  const mn = parsed.reduce((a, b) => (a.year < b.year || (a.year === b.year && a.month < b.month)) ? a : b);
  const mx = parsed.reduce((a, b) => (a.year > b.year || (a.year === b.year && a.month > b.month)) ? a : b);
  if (mn.month === mx.month && mn.year === mx.year) return months[mn.month] + ' ' + mn.year;
  if (mn.year === mx.year) return months[mn.month] + '-' + months[mx.month] + ' ' + mn.year;
  return months[mn.month] + ' ' + mn.year + ' - ' + months[mx.month] + ' ' + mx.year;
}

// ══════════════════════════════════════════════════
// RENDERING
// ══════════════════════════════════════════════════
let amountsVisible = true, currentResult = null;

function render(result) {
  currentResult = result;
  document.getElementById('cardMonth').textContent = result.monthStr;
  updateCard();
  buildTips(result);
  document.getElementById('drill').classList.remove('open');
  document.getElementById('results').style.display = 'block';
  document.getElementById('shareCard').scrollIntoView({behavior: 'smooth', block: 'start'});
}

function updateCard() {
  if (!currentResult) return;
  const r = currentResult, total = r.grandTotal;
  document.getElementById('shareTotal').textContent = amountsVisible ? '₹' + fmtNum(total) : '₹••••••';
  let prev = null;
  try { const s = localStorage.getItem('kharcha_last'); if (s) prev = JSON.parse(s); } catch (e) {}
  const grid = document.getElementById('shareGrid');
  grid.innerHTML = '';
  r.categories.slice(0, 8).forEach(function (cat, idx) {
    const pct = ((cat.total / total) * 100).toFixed(0);
    const ci = CATEGORIES[cat.name] || {css: 'other', icon: '📌'};
    const div = document.createElement('div');
    div.className = 'share-cat' + (idx === 0 ? ' hero' : '');
    let delta = '';
    if (prev && prev.cats && prev.cats[cat.name]) {
      const ch = ((cat.total - prev.cats[cat.name]) / prev.cats[cat.name] * 100).toFixed(0);
      if (ch > 0) delta = '<span class="share-cat-delta up">↑' + ch + '%</span>';
      else if (ch < 0) delta = '<span class="share-cat-delta down">↓' + Math.abs(ch) + '%</span>';
    }
    const amt = amountsVisible ? '₹' + fmtNum(cat.total) : pct + '%';
    div.innerHTML = '<div class="share-cat-icon si-' + ci.css + '">' + ci.icon + '</div><div class="share-cat-info"><div class="share-cat-name">' + cat.name + '</div><div class="share-cat-amt">' + amt + '<span class="share-cat-pct"> ' + pct + '%</span>' + delta + '</div></div><span class="share-cat-arrow">▸</span>';
    div.addEventListener('click', function () { showDrill(cat.name); });
    grid.appendChild(div);
  });
}

function showDrill(name) {
  if (!currentResult) return;
  const cat = currentResult.categories.find(function (c) { return c.name === name; });
  if (!cat) return;
  const ci = CATEGORIES[name] || {icon: '📌'};
  document.getElementById('drillIcon').textContent = ci.icon;
  document.getElementById('drillName').textContent = name;
  document.getElementById('drillTotal').textContent = amountsVisible ? '₹' + fmtNum(cat.total) : '₹••••';
  const list = document.getElementById('drillList');
  list.innerHTML = '';
  [...cat.items].sort(function (a, b) { return b.amount - a.amount; }).forEach(function (item) {
    const div = document.createElement('div');
    div.className = 'drill-item';
    div.innerHTML = '<span class="drill-item-name">' + item.merchant + '</span><span class="drill-item-amt">' + (amountsVisible ? '₹' + fmtNum(item.amount) : '₹••') + '</span><span class="drill-item-date">' + (item.date || '') + '</span>';
    list.appendChild(div);
  });
  document.getElementById('drill').classList.add('open');
  document.getElementById('drill').scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

function buildTips(result) {
  const sec = document.getElementById('tipsSection');
  sec.innerHTML = '';
  result.categories.forEach(function (cat) {
    const ci = CATEGORIES[cat.name];
    if (!ci || !ci.tips) return;
    const div = document.createElement('div');
    div.className = 'tips-cat';
    div.innerHTML = '<div class="tips-cat-name">' + ci.icon + ' ' + cat.name + '</div><div class="tips-cat-list">' + ci.tips + '</div>';
    sec.appendChild(div);
  });
}

function fmtNum(n) {
  const s = Math.round(n).toString();
  if (s.length <= 3) return s;
  let r = s.slice(-3), rest = s.slice(0, -3);
  while (rest.length > 2) { r = rest.slice(-2) + ',' + r; rest = rest.slice(0, -2); }
  if (rest.length > 0) r = rest + ',' + r;
  return r;
}

// ══════════════════════════════════════════════════
// PDF HANDLING
// ══════════════════════════════════════════════════
let currentFile = null;
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const pwdSection = document.getElementById('pwdSection');
const pwdInput = document.getElementById('pwdInput');
const unlockBtn = document.getElementById('unlockBtn');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');

dropzone.addEventListener('dragover', function (e) { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', function () { dropzone.classList.remove('drag'); });
dropzone.addEventListener('drop', function (e) { e.preventDefault(); dropzone.classList.remove('drag'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', function (e) { if (e.target.files.length) handleFile(e.target.files[0]); });

async function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) { showStatus('please select a PDF file', true); return; }
  currentFile = new Uint8Array(await file.arrayBuffer());
  showStatus('reading...');
  try {
    const pdf = await pdfjsLib.getDocument({data: currentFile.slice()}).promise;
    await processPDF(pdf);
  } catch (err) {
    if (err.name === 'PasswordException') { pwdSection.style.display = 'block'; showStatus('password protected'); pwdInput.focus(); }
    else showStatus('could not read this PDF: ' + err.message, true);
  }
}

unlockBtn.addEventListener('click', async function () {
  const pwd = pwdInput.value.trim(); if (!pwd) return;
  showStatus('unlocking...');
  try {
    const pdf = await pdfjsLib.getDocument({data: currentFile.slice(), password: pwd}).promise;
    pwdSection.style.display = 'none';
    await processPDF(pdf);
  } catch (err) {
    if (err.name === 'PasswordException') showStatus('wrong password - try DOB (DDMMYYYY) or PAN', true);
    else showStatus('could not read: ' + err.message, true);
  }
});
pwdInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') unlockBtn.click(); });

async function processPDF(pdf) {
  showStatus('analyzing spending...');

  const textOk = await hasText(pdf);
  if (!textOk) {
    showStatus('this PDF has no readable text - it may be a scanned image or the text was removed. try the original password-protected version from your bank.', true);
    return;
  }

  const pages = await getAllItems(pdf);

  // Strategy 1: column-aware
  const columns = detectColumns(pages);
  let txns = [];
  if (columns) {
    txns = extractWithColumns(pages, columns);
  }

  // Strategy 2: row-based fallback
  if (txns.length < 3) {
    const t2 = extractRowBased(pages);
    if (t2.length > txns.length) txns = t2;
  }

  // Strategy 3: date-split last resort
  if (txns.length < 3) {
    const t3 = extractDateSplit(pages);
    if (t3.length > txns.length) txns = t3;
  }

  if (txns.length === 0) {
    showStatus('could not detect transactions. supported: HDFC, ICICI, SBI, Kotak, Axis and most Indian bank statements.', true);
    return;
  }

  const result = analyze(txns);
  if (result.grandTotal === 0) {
    showStatus('transactions found but none matched known spending categories.', true);
    return;
  }

  statusEl.style.display = 'none';
  render(result);
}

// ══════════════════════════════════════════════════
// EVENT HANDLERS
// ══════════════════════════════════════════════════

document.getElementById('eyeToggle').addEventListener('click', function (e) {
  e.stopPropagation();
  e.preventDefault();
  amountsVisible = !amountsVisible;
  this.textContent = amountsVisible ? '👁' : '🔒';
  updateCard();
  if (document.getElementById('drill').classList.contains('open')) {
    showDrill(document.getElementById('drillName').textContent);
  }
});

document.getElementById('shareBtn').addEventListener('click', async function () {
  const card = document.getElementById('shareCard'), btn = this;
  btn.textContent = 'generating...'; btn.disabled = true;
  try {
    const canvas = await html2canvas(card, {backgroundColor: '#1a1a1a', scale: 2, useCORS: true, logging: false});
    canvas.toBlob(async function (blob) {
      if (navigator.share && navigator.canShare) {
        try {
          const file = new File([blob], 'my-kharcha.png', {type: 'image/png'});
          if (navigator.canShare({files: [file]})) { await navigator.share({files: [file], title: 'my kharcha'}); btn.textContent = '📤 share card'; btn.disabled = false; return; }
        } catch (e) {}
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'my-kharcha.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      btn.textContent = '✓ saved'; btn.disabled = false;
      setTimeout(function () { btn.textContent = '📤 share card'; }, 2000);
    }, 'image/png');
  } catch (e) { btn.textContent = '📤 share card'; btn.disabled = false; }
});

document.getElementById('rememberBtn').addEventListener('click', function () {
  if (!currentResult) return;
  const data = {date: new Date().toISOString(), total: currentResult.grandTotal, cats: {}};
  currentResult.categories.forEach(function (c) { data.cats[c.name] = c.total; });
  try { localStorage.setItem('kharcha_last', JSON.stringify(data)); } catch (e) {}
  this.textContent = '✓ saved for next month'; this.disabled = true;
  const btn = this; setTimeout(function () { btn.textContent = '📌 remember this month'; btn.disabled = false; }, 2000);
});

document.getElementById('tipsToggle').addEventListener('click', function () {
  const sec = document.getElementById('tipsSection');
  const open = sec.classList.toggle('open');
  this.textContent = open ? 'what\'s included in each category? ▴' : 'what\'s included in each category? ▾';
});

document.getElementById('drillClose').addEventListener('click', function () {
  document.getElementById('drill').classList.remove('open');
});

document.getElementById('clearBtn').addEventListener('click', function () {
  currentFile = null; currentResult = null; amountsVisible = true;
  fileInput.value = ''; pwdInput.value = '';
  pwdSection.style.display = 'none'; resultsEl.style.display = 'none'; statusEl.style.display = 'none';
  document.getElementById('shareGrid').innerHTML = '';
  document.getElementById('shareTotal').textContent = '₹0';
  document.getElementById('eyeToggle').textContent = '👁';
  document.getElementById('drill').classList.remove('open');
  document.getElementById('tipsSection').classList.remove('open');
  document.getElementById('tipsToggle').textContent = 'what\'s included in each category? ▾';
  dropzone.scrollIntoView({behavior: 'smooth'});
});

function showStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (isError ? ' error' : '');
  statusEl.style.display = 'block';
  resultsEl.style.display = 'none';
}
