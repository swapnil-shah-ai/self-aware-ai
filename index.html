*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--card:#FFF;--text:#1a1a1a;--muted:#6b6b6b;--hint:#9b9b9b;--border:#e8e8e4;--accent:#E8593C;--accent-light:#FEF0ED}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.trust-strip{background:#1a1a1a;color:rgba(255,255,255,.6);text-align:center;padding:7px 16px;font-size:10.5px;font-family:'DM Mono',monospace;letter-spacing:.2px}

.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-light)}
.dropzone-icon{font-size:30px;margin-bottom:6px;opacity:.5}

.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.pwd-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;display:none}
.pwd-section label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.pwd-row{display:flex;gap:8px}
.pwd-row input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.pwd-row input:focus{border-color:var(--accent)}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-clear{background:#FEE;color:var(--accent);border:1px solid #FCC}
.btn-remember{background:#E6F5EE;color:#0F6E56;border:1px solid #9FE1CB}
.btn-share{background:#EFF6FF;color:#2563EB;border:1px solid #B5D4F4}
.status{text-align:center;padding:14px;font-size:13px;color:var(--muted);display:none;line-height:1.5}
.status.error{color:var(--accent)}
.results{display:none}

.share-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.share-card-title{color:#fff;font-size:18px;font-weight:700;letter-spacing:-.5px}
.share-card-month{color:rgba(255,255,255,.4);font-size:11px;font-family:'DM Mono',monospace;margin-top:2px}
.share-total-label{color:rgba(255,255,255,.35);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.share-total{color:#fff;font-size:30px;font-weight:700;letter-spacing:-1px;margin-bottom:14px}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.share-cat{background:rgba(255,255,255,.07);border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s}
.share-cat:active{background:rgba(255,255,255,.12)}

.share-cat-info{min-width:0;flex:1}
.share-cat-name{color:rgba(255,255,255,.6);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.share-cat-amt{color:#fff;font-size:12.5px;font-weight:700}

const SKIP_CATS=new Set(['Other','Transfers']);

// Build priority-sorted keyword list (longer keywords match first to avoid false positives)
// e.g. "AMAZON FRESH" matches Quick Commerce before "AMAZON" matches E-commerce
const KEYWORD_INDEX=[];
for(const[cat,info]of Object.entries(CATEGORIES)){
  for(const kw of info.kw)KEYWORD_INDEX.push({kw:kw.toUpperCase(),cat});
}
KEYWORD_INDEX.sort((a,b)=>b.kw.length-a.kw.length);

function categorize(narration){
  for(const{kw,cat}of KEYWORD_INDEX){
    if(narration.includes(kw))return cat;
  }
  return 'Other';
}

async function extractRows(pdf){
  const allRows=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);const content=await page.getTextContent();
    if(!content.items.length)continue;
    const buckets={};
    for(const item of content.items){const text=item.str;if(!text||!text.trim())continue;const y=Math.round(item.transform[5]);const x=Math.round(item.transform[4]);let bk=null;for(const k of Object.keys(buckets)){if(Math.abs(parseInt(k)-y)<=4){bk=k;break;}}if(!bk)bk=y.toString();if(!buckets[bk])buckets[bk]=[];buckets[bk].push({text,x});}
    const sortedYs=Object.keys(buckets).map(Number).sort((a,b)=>b-a);
    for(const k of sortedYs){const items=buckets[k].sort((a,b)=>a.x-b.x);allRows.push(items.map(i=>i.text.trim()).filter(Boolean).join('  '));}
  }
  return allRows;
}

async function hasText(pdf){let c=0;for(let p=1;p<=Math.min(pdf.numPages,3);p++){const page=await pdf.getPage(p);const content=await page.getTextContent();for(const item of content.items)c+=item.str.trim().length;}return c>50;}

function parseAllTransactions(rows){
  const txns=[];
  const dateRe=[/\b(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})\b/,/\b(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+\d{2,4})\b/i,/\b(\d{1,2}(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\d{2,4})\b/i];
  const creditRe=/\b(CR\b|CREDIT|CREDITED|SALARY|RECEIVED|REFUND|CASHBACK|REVERSAL|BY TRANSFER|INTEREST CREDIT|INT\.PAID|DIVIDEND)/i;
  const skipRe=/\b(OPENING BALANCE|CLOSING BALANCE|STATEMENT SUMMARY|PAGE \d|GRAND TOTAL|ACCOUNT NUMBER|CUSTOMER ID|BRANCH|IFSC|CIF NO|NOMINEE|EMAIL ID|PARTICULARS|NARRATION|DESCRIPTION|WITHDRAWAL|DEPOSIT\b|BALANCE\b|CHEQUE NO|DATE\s+DATE)\b/i;

  for(let i=0;i<rows.length;i++){
    const row=rows[i];if(!row||row.length<10)continue;
    const words=row.split(/\s+/);const skipW=words.filter(w=>skipRe.test(w));
    if(skipW.length>words.length*0.4&&words.length<8)continue;
    let hasDate=false;let dateStr='';
    for(const re of dateRe){const dm=row.match(re);if(dm){hasDate=true;dateStr=dm[1]||dm[0];break;}}
    if(!hasDate)continue;
    const amounts=[];let m;
    const re=/(\d{1,3}(?:,\d{2,3})*\.\d{2})\b/g;
    while((m=re.exec(row))!==null){const val=parseFloat(m[1].replace(/,/g,''));if(val>0&&val<50000000)amounts.push({val,idx:m.index});}
    if(amounts.length===0){const re2=/\b(\d{1,3}(?:,\d{2,3})+)\b/g;while((m=re2.exec(row))!==null){const val=parseFloat(m[1].replace(/,/g,''));if(val>=10&&val<50000000)amounts.push({val,idx:m.index});}}
    if(amounts.length===0)continue;
    let fullRow=row;let la=1;
    while(la<=2&&(i+la)<rows.length){const nr=rows[i+la];if(!nr)break;let nd=false;for(const r2 of dateRe){if(r2.test(nr)){nd=true;break;}}const na=nr.match(/\d{1,3}(?:,\d{2,3})*\.\d{2}/g);if(!nd&&!na&&nr.length<80&&nr.length>2){fullRow+=' '+nr;la++;}else break;}
    const narration=fullRow.toUpperCase();const isCredit=creditRe.test(narration);
    let amount=0;
    if(amounts.length===1){amount=amounts[0].val;}
    else{const sorted=[...amounts].sort((a,b)=>a.idx-b.idx);const lastVal=sorted[sorted.length-1].val;for(const a of sorted){if(a.val!==lastVal||sorted.length<=2){amount=a.val;break;}}if(amount===0)amount=sorted[0].val;if(amounts.length===2&&amount>amounts[1].val*3)amount=Math.min(amounts[0].val,amounts[1].val);}
    if(amount<1||amount>5000000)continue;
    const category=categorize(narration);
    let merchant=narration.substring(0,60);
    merchant=merchant.replace(/\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}/g,'');
    merchant=merchant.replace(/\d{1,2}\s*(?:JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\w*\s*\d{2,4}/gi,'');
    merchant=merchant.replace(/^(UPI[\/\-\s]*|POS\s*[\/\s]*|ECOM[\/\s]*|IB[\/\s]*|MB[\/\s]*|NFS[\/\s]*|VPS[\/\s]*|BIL[\/\s]*|BILL\s*)/i,'');
    merchant=merchant.replace(/\d{1,3}(?:,\d{2,3})*\.\d{2}/g,'');
    merchant=merchant.replace(/\b\d{8,}\b/g,'');
    merchant=merchant.split(/[\/\-@\\]/)[0].trim();
    merchant=merchant.replace(/^\W+|\W+$/g,'').substring(0,28);
    if(!merchant||merchant.length<2)merchant='UNKNOWN';
    txns.push({narration,amount,category,merchant,isCredit,date:dateStr});
  }
  return txns;
}

function analyze(txns){
  const debits=txns.filter(t=>!t.isCredit&&!SKIP_CATS.has(t.category));
  const byCat={};
  for(const t of debits){
    if(!byCat[t.category])byCat[t.category]={total:0,count:0,items:[]};
    byCat[t.category].total+=t.amount;byCat[t.category].count++;
    byCat[t.category].items.push({merchant:t.merchant,amount:t.amount,date:t.date});
  }
  const sorted=Object.entries(byCat).map(([name,data])=>({name,...data})).sort((a,b)=>b.total-a.total);
  const grandTotal=sorted.reduce((s,c)=>s+c.total,0);
  return{categories:sorted,grandTotal,txnCount:debits.length};
}

let amountsVisible=true;let currentResult=null;

function render(result){
  currentResult=result;
  document.getElementById('cardMonth').textContent=new Date().toLocaleString('en-IN',{month:'short',year:'numeric'}).toLowerCase();
  updateAmounts();
  buildTips(result);
  document.getElementById('drill').classList.remove('open');
  document.getElementById('results').style.display='block';
  document.getElementById('shareCard').scrollIntoView({behavior:'smooth',block:'start'});
}

function updateAmounts(){
  if(!currentResult)return;
  const r=currentResult;const total=r.grandTotal;
  document.getElementById('shareTotal').textContent=amountsVisible?`₹${fmtNum(total)}`:'₹••••••';
  let prevData=null;
  try{const s=localStorage.getItem('kharcha_last');if(s)prevData=JSON.parse(s);}catch(e){}
  const grid=document.getElementById('shareGrid');grid.innerHTML='';
  const cats=r.categories.slice(0,8);
  cats.forEach((cat,idx)=>{
    const pct=((cat.total/total)*100).toFixed(0);
    const ci=CATEGORIES[cat.name]||{css:'other',icon:'📌'};
    const isHero=idx===0;
    const div=document.createElement('div');
    div.className=`share-cat${isHero?' hero':''}`;
    div.setAttribute('data-cat',cat.name);
    let deltaHtml='';
    if(prevData&&prevData.cats&&prevData.cats[cat.name]){
      const prev=prevData.cats[cat.name];const change=((cat.total-prev)/prev*100).toFixed(0);
      if(change>0)deltaHtml=`<span class="share-cat-delta up">↑${change}%</span>`;
      else if(change<0)deltaHtml=`<span class="share-cat-delta down">↓${Math.abs(change)}%</span>`;
    }
    const amtText=amountsVisible?`₹${fmtNum(cat.total)}`:'₹••••';
    div.innerHTML=`<div class="share-cat-icon si-${ci.css}">${ci.icon}</div><div class="share-cat-info"><div class="share-cat-name">${cat.name}</div><div class="share-cat-amt">${amtText}<span class="share-cat-pct">${pct}%</span>${deltaHtml}</div></div><span class="share-cat-arrow">▸</span>`;
    div.addEventListener('click',()=>showDrill(cat.name));
    grid.appendChild(div);
  });
}

function showDrill(catName){
  if(!currentResult)return;
  const cat=currentResult.categories.find(c=>c.name===catName);
  if(!cat)return;
  const ci=CATEGORIES[catName]||{icon:'📌'};
  document.getElementById('drillIcon').textContent=ci.icon;
  document.getElementById('drillName').textContent=catName;
  document.getElementById('drillTotal').textContent=amountsVisible?`₹${fmtNum(cat.total)}`:'₹••••';
  const list=document.getElementById('drillList');list.innerHTML='';
  // Sort items by amount descending
  const sorted=[...cat.items].sort((a,b)=>b.amount-a.amount);
  for(const item of sorted){
    const div=document.createElement('div');div.className='drill-item';
    const amtText=amountsVisible?`₹${fmtNum(item.amount)}`:'₹••';
    div.innerHTML=`<span class="drill-item-name">${titleCase(item.merchant)}</span><span class="drill-item-amt">${amtText}</span><span class="drill-item-date">${item.date||''}</span>`;
    list.appendChild(div);
  }
  const drill=document.getElementById('drill');
  drill.classList.add('open');
  drill.scrollIntoView({behavior:'smooth',block:'start'});
}

document.getElementById('drillClose').addEventListener('click',()=>{
  document.getElementById('drill').classList.remove('open');
});

function buildTips(result){
  const sec=document.getElementById('tipsSection');sec.innerHTML='';
  for(const cat of result.categories){
    const ci=CATEGORIES[cat.name];if(!ci||!ci.tips)continue;
    const div=document.createElement('div');div.className='tips-cat';
    div.innerHTML=`<div class="tips-cat-name">${ci.icon} ${cat.name}</div><div class="tips-cat-list">${ci.tips}</div>`;
    sec.appendChild(div);
  }
}

function fmtNum(n){const s=Math.round(n).toString();if(s.length<=3)return s;let r=s.slice(-3);let rest=s.slice(0,-3);while(rest.length>2){r=rest.slice(-2)+','+r;rest=rest.slice(0,-2);}if(rest.length>0)r=rest+','+r;return r;}
function titleCase(s){return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()).substring(0,28);}

let currentFile=null;
const dropzone=document.getElementById('dropzone'),fileInput=document.getElementById('fileInput'),pwdSection=document.getElementById('pwdSection'),pwdInput=document.getElementById('pwdInput'),unlockBtn=document.getElementById('unlockBtn'),statusEl=document.getElementById('status'),resultsEl=document.getElementById('results');

dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('drag');});
dropzone.addEventListener('dragleave',()=>dropzone.classList.remove('drag'));
dropzone.addEventListener('drop',e=>{e.preventDefault();dropzone.classList.remove('drag');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0]);});

async function handleFile(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){showStatus('please select a PDF file',true);return;}
  currentFile=new Uint8Array(await file.arrayBuffer());showStatus('reading...');
  try{const pdf=await pdfjsLib.getDocument({data:currentFile.slice()}).promise;await processPDF(pdf);}
  catch(err){if(err.name==='PasswordException'){pwdSection.style.display='block';showStatus('password protected');pwdInput.focus();}else showStatus('could not read this PDF: '+err.message,true);}
}
unlockBtn.addEventListener('click',async()=>{const pwd=pwdInput.value.trim();if(!pwd)return;showStatus('unlocking...');try{const pdf=await pdfjsLib.getDocument({data:currentFile.slice(),password:pwd}).promise;pwdSection.style.display='none';await processPDF(pdf);}catch(err){if(err.name==='PasswordException')showStatus('wrong password - try DOB (DDMMYYYY) or PAN',true);else showStatus('could not read: '+err.message,true);}});
pwdInput.addEventListener('keydown',e=>{if(e.key==='Enter')unlockBtn.click();});

async function processPDF(pdf){
  showStatus('analyzing spending...');
  const textFound=await hasText(pdf);
  if(!textFound){showStatus('this PDF has no readable text - it may be a scanned image or the text was removed. try the original password-protected version from your bank.',true);return;}
  const rows=await extractRows(pdf);let txns=parseAllTransactions(rows);
  if(txns.length<3){let ft='';for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const content=await page.getTextContent();let lastY=null;for(const item of content.items){const y=Math.round(item.transform[5]);if(lastY!==null&&Math.abs(y-lastY)>4)ft+='\n';else if(lastY!==null)ft+='  ';ft+=item.str;lastY=y;}ft+='\n';}const t2=parseAllTransactions(ft.split('\n').filter(r=>r.trim()));if(t2.length>txns.length)txns=t2;}
  if(txns.length<3){let ft='';for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const content=await page.getTextContent();ft+=content.items.map(item=>item.str).join(' ')+'\n';}const t3=parseAllTransactions(ft.split(/(?=\b\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\b)|(?=\b\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec))/i).filter(r=>r.trim()));if(t3.length>txns.length)txns=t3;}
  if(txns.length===0){showStatus('could not detect transactions in this PDF. supported: HDFC, ICICI, SBI, Kotak, Axis and most Indian bank statements.',true);return;}
  const result=analyze(txns);
  if(result.grandTotal===0){showStatus('transactions found but none matched known spending categories.',true);return;}
  statusEl.style.display='none';render(result);
}

// Share
document.getElementById('shareBtn').addEventListener('click',async()=>{
  const card=document.getElementById('shareCard');const btn=document.getElementById('shareBtn');
  btn.textContent='generating...';btn.disabled=true;
  try{
    const canvas=await html2canvas(card,{backgroundColor:'#1a1a1a',scale:2,useCORS:true,logging:false});
    canvas.toBlob(async(blob)=>{
      if(navigator.share&&navigator.canShare){
        try{const file=new File([blob],'my-kharcha.png',{type:'image/png'});
        if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'my kharcha',text:'where did my money go?'});btn.textContent='📤 share card';btn.disabled=false;return;}}catch(e){}}
      const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='my-kharcha.png';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      btn.textContent='✓ saved';btn.disabled=false;setTimeout(()=>{btn.textContent='📤 share card';},2000);
    },'image/png');
  }catch(e){btn.textContent='📤 share card';btn.disabled=false;}
});

document.getElementById('eyeToggle').addEventListener('click',()=>{amountsVisible=!amountsVisible;document.getElementById('eyeToggle').textContent=amountsVisible?'👁':'🔒';updateAmounts();document.getElementById('drill').classList.remove('open');});
document.getElementById('rememberBtn').addEventListener('click',()=>{if(!currentResult)return;const data={date:new Date().toISOString(),total:currentResult.grandTotal,cats:{}};for(const c of currentResult.categories)data.cats[c.name]=c.total;try{localStorage.setItem('kharcha_last',JSON.stringify(data));}catch(e){}const btn=document.getElementById('rememberBtn');btn.textContent='✓ saved for next month';btn.disabled=true;setTimeout(()=>{btn.textContent='📌 remember this month';btn.disabled=false;},2000);});
document.getElementById('tipsToggle').addEventListener('click',()=>{const sec=document.getElementById('tipsSection');const btn=document.getElementById('tipsToggle');const open=sec.classList.toggle('open');btn.textContent=open?'what\'s included in each category? ▴':'what\'s included in each category? ▾';});
document.getElementById('clearBtn').addEventListener('click',()=>{currentFile=null;currentResult=null;amountsVisible=true;fileInput.value='';pwdInput.value='';pwdSection.style.display='none';resultsEl.style.display='none';statusEl.style.display='none';document.getElementById('shareGrid').innerHTML='';document.getElementById('shareTotal').textContent='₹0';document.getElementById('eyeToggle').textContent='👁';document.getElementById('drill').classList.remove('open');document.getElementById('tipsSection').classList.remove('open');document.getElementById('tipsToggle').textContent='what\'s included in each category? ▾';dropzone.scrollIntoView({behavior:'smooth'});});

function showStatus(msg,isError=false){statusEl.textContent=msg;statusEl.className='status'+(isError?' error':'');statusEl.style.display='block';resultsEl.style.display='none';}
</script>
